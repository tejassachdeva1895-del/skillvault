<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillVault – AI Career Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1B3E;--navy-light:#1A2E5A;--blue:#1E40AF;--accent:#3B82F6;
  --accent-glow:#60A5FA;--lavender:#C7D2FE;--lavender-light:#EEF2FF;
  --white:#F8FAFF;--gray:#94A3B8;--gray-light:#E2E8F0;
  --success:#10B981;--warning:#F59E0B;--danger:#EF4444;
  --text:#1E293B;--text-muted:#64748B;
}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);overflow-x:hidden}
.sv-app{display:flex;flex-direction:column;min-height:100vh;max-width:1280px;margin:0 auto}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,27,62,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(99,132,250,0.2);padding:0 32px;display:flex;align-items:center;gap:0;height:60px}
.topbar-logo{display:flex;align-items:center;gap:10px;margin-right:36px;cursor:pointer}
.logo-badge{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#C7D2FE,#EEF2FF);display:flex;align-items:center;justify-content:center;border:2px solid rgba(99,132,250,0.4);font-size:13px;font-weight:800;font-family:'Syne',sans-serif;color:#0D1B3E;flex-shrink:0}
.topbar-logo span{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--white);letter-spacing:1px}
.topbar-nav{display:flex;align-items:center;gap:2px;flex:1}
.nav-item{padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;color:rgba(248,250,255,0.65);transition:all .18s;display:flex;align-items:center;gap:6px}
.nav-item:hover{color:var(--white);background:rgba(99,132,250,0.12)}
.nav-item.active{color:var(--white);background:rgba(59,130,246,0.22);border:1px solid rgba(99,132,250,0.3)}
.topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.notif{position:relative}
.notif-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--danger);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid rgba(13,27,62,0.97)}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;cursor:pointer;border:2px solid rgba(99,132,250,0.4)}
.bell-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center}

/* MAIN */
.main-content{flex:1;padding:28px 32px}
.page{display:none}.page.active{display:block}

/* CARDS */
.card{background:white;border-radius:16px;border:1px solid var(--gray-light);box-shadow:0 2px 16px rgba(13,27,62,0.06);padding:24px;transition:all .2s}
.card:hover{box-shadow:0 4px 28px rgba(13,27,62,0.1);transform:translateY(-1px)}
.card-navy{background:var(--navy);border-color:rgba(99,132,250,0.2);color:white}
.card-navy:hover{transform:none}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--blue));color:white;box-shadow:0 4px 14px rgba(59,130,246,0.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.45)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--lavender-light);color:var(--blue);border:1px solid var(--lavender)}
.btn-secondary:hover{background:var(--lavender)}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-ghost:hover{background:rgba(59,130,246,0.08)}
.btn-sm{padding:7px 14px;font-size:12.5px}
.btn-lg{padding:13px 30px;font-size:15px}
.btn-outline-white{background:rgba(255,255,255,0.12);color:white;border:1px solid rgba(255,255,255,0.2);padding:13px 24px;font-size:15px;font-weight:600;border-radius:10px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge-easy{background:#DCFCE7;color:#15803D}
.badge-medium{background:#FEF9C3;color:#A16207}
.badge-hard{background:#FEE2E2;color:#B91C1C}
.badge-blue{background:var(--lavender-light);color:var(--blue)}
.badge-success{background:#DCFCE7;color:#15803D}

/* TYPOGRAPHY */
.h1{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;line-height:1.15}
.h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.section-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text)}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-3{margin-bottom:12px}.mb-2{margin-bottom:8px}
.mt-4{margin-top:16px}.mt-6{margin-top:24px}.w-full{width:100%}

/* PROGRESS */
.progress-track{background:var(--gray-light);border-radius:99px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-glow));transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* INPUT */
.input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--gray-light);font-size:14px;font-family:'DM Sans',sans-serif;background:white;color:var(--text);transition:border-color .18s;outline:none}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.input-icon{position:relative}
.input-icon .input{padding-left:38px}
.input-icon-left{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-light);background:white;color:var(--text-muted);transition:all .15s}
.chip:hover,.chip.active{background:var(--lavender-light);color:var(--blue);border-color:var(--lavender)}

/* GLOW LINE */
.glow-line{height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:99px;margin:24px 0}

/* HERO */
.hero-bg{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 60%,#1E3A8A 100%);border-radius:20px;padding:48px;position:relative;overflow:hidden;margin-bottom:28px}
.hero-bg::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.18) 0%,transparent 70%)}
.hero-bg::after{content:'';position:absolute;bottom:-40px;left:30%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(99,132,250,0.1) 0%,transparent 70%)}

/* STAT PILL */
.stat-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:16px 20px}
.stat-pill-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:white}
.stat-pill-label{font-size:11.5px;color:rgba(255,255,255,0.65)}

/* ROADMAP */
.roadmap-wrap{display:flex;align-items:center}
.roadmap-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.roadmap-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid}
.roadmap-circle.done{background:var(--success);border-color:var(--success);color:white}
.roadmap-circle.active{background:var(--accent);border-color:var(--accent);color:white;box-shadow:0 0 16px rgba(59,130,246,0.4)}
.roadmap-circle.pending{background:white;border-color:var(--gray-light);color:var(--gray)}
.roadmap-connector{flex:1;height:2px;background:var(--gray-light);margin-top:-22px}
.roadmap-connector.done{background:var(--success)}
.roadmap-label{font-size:11.5px;font-weight:600;text-align:center;color:var(--text-muted)}
.roadmap-label.active{color:var(--accent)}
.roadmap-label.done{color:var(--success)}

/* CHAT */
.chat-wrap{display:grid;grid-template-columns:260px 1fr;gap:20px;height:calc(100vh - 140px)}
.chat-sidebar{display:flex;flex-direction:column;gap:12px}
.chat-main{display:flex;flex-direction:column;background:white;border-radius:16px;border:1px solid var(--gray-light);overflow:hidden;box-shadow:0 2px 16px rgba(13,27,62,0.06)}
.chat-header{padding:16px 20px;background:var(--navy);display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(99,132,250,0.2)}
.chat-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 6px var(--success)}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.chat-bubble{max-width:68%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.55}
.chat-bubble.user{background:linear-gradient(135deg,var(--accent),var(--blue));color:white;align-self:flex-end;border-bottom-right-radius:4px}
.chat-bubble.ai{background:var(--lavender-light);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--lavender)}
.chat-bubble.ai .sender{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:4px}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:12px 16px;background:var(--lavender-light);border-radius:14px;border-bottom-left-radius:4px;width:fit-content;border:1px solid var(--lavender)}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:typingBounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-composer{padding:16px 20px;border-top:1px solid var(--gray-light);display:flex;gap:10px;align-items:flex-end}
.chat-chips{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--gray-light);background:var(--lavender-light)}

/* ONBOARDING */
.onboard-wrap{min-height:100vh;background:linear-gradient(135deg,var(--navy) 0%,#1E3A8A 100%);display:flex;align-items:center;justify-content:center;padding:40px}
.onboard-card{background:white;border-radius:24px;padding:48px 56px;width:580px;max-width:100%;box-shadow:0 24px 80px rgba(0,0,0,0.3)}
.step-dots{display:flex;gap:8px;margin-bottom:32px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-light);transition:all .3s}
.step-dot.active{background:var(--accent);width:24px;border-radius:4px}
.step-dot.done{background:var(--success)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.role-card{padding:16px;border-radius:12px;border:2px solid var(--gray-light);cursor:pointer;transition:all .18s;text-align:center}
.role-card:hover,.role-card.selected{border-color:var(--accent);background:var(--lavender-light)}

/* TEST */
.test-player{display:grid;grid-template-columns:200px 1fr 240px;gap:20px;height:calc(100vh - 160px)}
.q-nav-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;align-content:start}
.q-num{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-light);background:white;transition:all .15s}
.q-num.answered{background:var(--success);color:white;border-color:var(--success)}
.q-num.current{background:var(--accent);color:white;border-color:var(--accent)}
.option-card{padding:14px 18px;border-radius:12px;border:2px solid var(--gray-light);cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;transition:all .15s;margin-bottom:10px}
.option-card:hover{border-color:var(--accent);background:var(--lavender-light)}
.option-card.selected{border-color:var(--accent);background:var(--lavender-light)}
.option-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* SLOT */
.slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.slot{padding:10px;border-radius:10px;border:1.5px solid var(--gray-light);text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.slot:hover,.slot.selected{border-color:var(--accent);background:var(--lavender-light);color:var(--blue)}
.slot.unavailable{opacity:.4;cursor:not-allowed;pointer-events:none}

/* BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:12px;height:120px}
.bar-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.bar{border-radius:6px 6px 0 0;width:100%}
.bar-label{font-size:11px;color:var(--text-muted);text-align:center;font-weight:500}
.bar-val{font-size:12px;font-weight:700;color:var(--text)}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--lavender-light);padding:4px;border-radius:12px;width:fit-content;margin-bottom:20px}
.tab{padding:8px 18px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all .18s}
.tab.active{background:white;color:var(--blue);box-shadow:0 2px 8px rgba(13,27,62,0.08)}

/* PROFILE AVATAR */
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--navy));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:white;font-family:'Syne',sans-serif}

/* FILTER */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
select.filter-select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--gray-light);font-size:13px;font-family:'DM Sans',sans-serif;background:white;color:var(--text);cursor:pointer;outline:none}
select.filter-select:focus{border-color:var(--accent)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease both}
.fade-up-2{animation:fadeUp .4s .08s ease both}
.fade-up-3{animation:fadeUp .4s .16s ease both}
.fade-up-4{animation:fadeUp .4s .24s ease both}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--lavender);border-radius:99px}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding" class="onboard-wrap">
  <div class="onboard-card">
    <div class="step-dots" id="stepDots"></div>
    <div id="onboardSteps"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" class="sv-app" style="display:none">
  <nav class="topbar">
    <div class="topbar-logo" onclick="navigate('home')">
      <div class="logo-badge">SV</div>
      <span>SKILLVAULT</span>
    </div>
    <div class="topbar-nav" id="topbarNav"></div>
    <div class="topbar-right">
      <div class="notif">
        <button class="bell-btn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        </button>
        <div class="notif-badge">2</div>
      </div>
      <div class="avatar" onclick="navigate('profile')">AK</div>
    </div>
  </nav>
  <main class="main-content" id="mainContent"></main>
</div>

<script>
// ── SVG Icons ──────────────────────────────────────────────
const ICONS = {
  home:`<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>`,
  test:`<path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/>`,
  chat:`<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>`,
  consult:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>`,
  companies:`<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
  profile:`<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
  search:`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
  send:`<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`,
  clock:`<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,
  star:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
  arrow:`<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>`,
  check:`<polyline points="20 6 9 17 4 12"/>`,
  plus:`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
  book:`<path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>`,
  lightning:`<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
  video:`<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>`,
  flag:`<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>`,
};
function icon(name,size=16,color='currentColor'){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
}

// ── Navigation ─────────────────────────────────────────────
const NAV_ITEMS=[
  {id:'home',label:'Home',icon:'home'},
  {id:'tests',label:'Tests',icon:'test'},
  {id:'chatbot',label:'Chatbot',icon:'chat'},
  {id:'consultation',label:'Consultation',icon:'consult'},
  {id:'companies',label:'Companies',icon:'companies'},
  {id:'profile',label:'Profile',icon:'profile'},
];
let currentPage='home';

function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===page);
  });
  renderPage(page);
}

function buildNav(){
  const nav=document.getElementById('topbarNav');
  nav.innerHTML=NAV_ITEMS.map(n=>`
    <div class="nav-item${n.id===currentPage?' active':''}" data-page="${n.id}" onclick="navigate('${n.id}')">
      ${icon(n.icon,15,n.id===currentPage?'white':'rgba(248,250,255,0.65)')}
      ${n.label}
    </div>`).join('');
}

function renderPage(page){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='';
  buildNav();
  const pages={home:renderHome,tests:renderTests,chatbot:renderChatbot,consultation:renderConsultation,companies:renderCompanies,profile:renderProfile};
  if(pages[page]) pages[page](mc);
}

// ── ONBOARDING ─────────────────────────────────────────────
let onboardStep=0;
const onboardData={role:'',level:'',goals:[]};
const ROLES=[{icon:'💻',label:'Software Engineer'},{icon:'📊',label:'Data Analyst'},{icon:'🎨',label:'Product Designer'},{icon:'📈',label:'Product Manager'},{icon:'🔒',label:'Cybersecurity'},{icon:'☁️',label:'Cloud / DevOps'}];

function renderOnboard(){
  const dots=document.getElementById('stepDots');
  dots.innerHTML=[0,1,2,3,4].map(i=>`<div class="step-dot ${i===onboardStep?'active':i<onboardStep?'done':''}"></div>`).join('');

  const container=document.getElementById('onboardSteps');
  const steps=[renderOnboardLogin,renderOnboardRole,renderOnboardExp,renderOnboardGoals,renderOnboardSummary];
  container.innerHTML=steps[onboardStep]();

  // Back button
  if(onboardStep>0){
    container.innerHTML+=`<button onclick="onboardBack()" style="margin-top:16px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px">← Back</button>`;
  }
}

function startTimer(){
  if(testState.timerInterval) clearInterval(testState.timerInterval);
  testState.timerInterval=setInterval(()=>{
    if(testState.timeLeft>0){testState.timeLeft--;updateTimer();}
    else clearInterval(testState.timerInterval);
  },1000);
}

function updateTimer(){
  const el=document.getElementById('timerDisplay');
  if(el){
    const s=testState.timeLeft;
    el.textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    el.style.color=s<300?'var(--danger)':'var(--blue)';
    el.parentElement.style.background=s<300?'#FEE2E2':'var(--lavender-light)';
  }
}

function renderQuestion(){

      <button class="btn btn-secondary btn-sm" onclick="prevQ()" ${testState.currentQ===0?'disabled':''}>← Prev</button>

    </div>`;
}

function goToQ(i){testState.currentQ=i;renderQuestion();updateQNav()}
function prevQ(){if(testState.currentQ>0){testState.currentQ--;renderQuestion();updateQNav()}}
function nextQ(){if(testState.currentQ<SAMPLE_QS.length-1){testState.currentQ++;renderQuestion();updateQNav()}}
function selectAnswer(i){testState.answers[testState.currentQ]=i;renderQuestion();updateQNav()}
function updateQNav(){
  document.querySelectorAll('.q-num').forEach((el,i)=>{

function renderChatMessages(){
  const el=document.getElementById('chatMessages');
  if(!el) return;
  el.innerHTML=chatMessages.map(m=>`
    <div class="chat-bubble ${m.role}" style="white-space:pre-wrap">
      ${m.role==='ai'?`<div class="sender">SkillVault AI</div>`:''}
      ${m.content}
    </div>`).join('');
  if(chatTyping) el.innerHTML+=`<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  el.scrollTop=el.scrollHeight;
}

async function chatSend(text){
  const input=document.getElementById('chatInput');
  const msg=text||(input?input.value:'');
  if(!msg.trim()||chatTyping) return;
  if(input) input.value='';
  chatMessages.push({role:'user',content:msg});
  chatTyping=true;
  renderChatMessages();
  try{
    const apiMessages=chatMessages.slice(0,-1).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content}));
    apiMessages.push({role:'user',content:msg});
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:"You are SkillVault's AI Interview Coach. You help users prepare for job interviews. Be concise, practical, and encouraging. Keep responses to 2-4 paragraphs max. Use bullet points for lists. Focus on actionable advice.",
        messages:apiMessages
      })
    });
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('')||"I'm here to help! Could you tell me more about what you're looking for?";
    chatMessages.push({role:'ai',content:reply});
  }catch{
    chatMessages.push({role:'ai',content:"I'm here to help with your interview prep! Ask me about mock questions, study plans, or career guidance."});
  }
  chatTyping=false;
  renderChatMessages();
}
